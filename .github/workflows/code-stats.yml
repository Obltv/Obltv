name: Generate Code Stats

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  code-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cloc
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc

      - name: Clone public repositories
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/obltv-repos
          gh api "users/${OWNER}/repos?per_page=100&type=owner&sort=updated" --paginate \
            --jq '.[] | select(.fork == false) | .clone_url' > /tmp/repos.txt
          while IFS= read -r repo; do
            name="$(basename "$repo" .git)"
            git clone --depth 1 "$repo" "/tmp/obltv-repos/$name"
          done < /tmp/repos.txt

      - name: Generate SVG
        run: |
          mkdir -p assets
          cloc /tmp/obltv-repos --json --exclude-dir=.git,node_modules,target,dist,build,.idea,.vscode > /tmp/cloc.json
          node <<'NODE'
          const fs = require("fs");
          const data = JSON.parse(fs.readFileSync("/tmp/cloc.json", "utf8"));
          const total = data.SUM || { nFiles: 0, blank: 0, comment: 0, code: 0 };
          const languages = Object.entries(data)
            .filter(([name]) => name !== "header" && name !== "SUM")
            .map(([name, value]) => ({ name, ...value }))
            .sort((a, b) => b.code - a.code);
          const top = languages.slice(0, 6);
          const fmt = (n) => Number(n || 0).toLocaleString("en-US");
          const esc = (s) => String(s).replace(/[&<>"']/g, (m) => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          }[m]));
          const max = Math.max(...top.map((l) => l.code), 1);
          const rows = top.map((lang, i) => {
            const y = 96 + i * 26;
            const w = Math.max(4, Math.round((lang.code / max) * 220));
            return `
              <text x="30" y="${y}" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">${esc(lang.name)}</text>
              <rect x="170" y="${y - 11}" width="220" height="10" rx="5" fill="#E2E8F0"/>
              <rect x="170" y="${y - 11}" width="${w}" height="10" rx="5" fill="${["#0EA5E9", "#22C55E", "#F59E0B", "#F97316", "#8B5CF6", "#14B8A6"][i]}"/>
              <text x="410" y="${y}" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#0F172A">${fmt(lang.code)}</text>`;
          }).join("");
          const svg = `<svg width="520" height="236" viewBox="0 0 520 236" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
            <title id="title">Code Stats</title>
            <desc id="desc">Repository code line statistics generated by GitHub Actions.</desc>
            <rect x="1" y="1" width="518" height="234" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
            <text x="28" y="42" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#0F172A">Code Stats</text>
            <text x="28" y="66" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#64748B">Generated from public non-fork repositories</text>
            ${rows}
            <rect x="28" y="190" width="138" height="30" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
            <text x="45" y="210" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#0EA5E9">${fmt(total.nFiles)} files</text>
            <rect x="190" y="190" width="138" height="30" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
            <text x="207" y="210" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#22C55E">${fmt(total.code)} code</text>
            <rect x="352" y="190" width="138" height="30" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
            <text x="369" y="210" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#F59E0B">${fmt(languages.length)} langs</text>
          </svg>`;
          fs.writeFileSync("assets/code-stats.svg", svg);
          NODE

      - name: Commit generated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/code-stats.svg
          git diff --cached --quiet || git commit -m "chore: update code stats"
          git push
