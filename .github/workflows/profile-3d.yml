name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

concurrency:
  group: profile-3d-contrib-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Polish GitBlock language chart
        run: node scripts/polish-profile-gitblock.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git diff --cached --quiet; then
            echo "No contribution graph changes to commit."
            exit 0
          fi
          git commit -m "chore: update 3d contribution graph"
          git pull --rebase origin main
          git push origin HEAD:main
